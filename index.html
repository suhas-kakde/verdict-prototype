<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Verdict — CX Prod Jira</title>
<style>
:root{
  --ink:#172B4D;--sub:#44546F;--sub2:#626F86;--faint:#8590A2;
  --nav:#0C57E4;--nav-d:#0B3EAE;
  --page:#fff;--surf:#F7F8F9;--hover:#F1F2F4;--sel:#E9F2FF;--border:#DFE1E6;--border2:#EBECF0;
  --link:#0C66E4;--indigo:#5A46C6;--indigo-d:#2C2364;--mint:#22A06B;
  --clear:#22A06B;--clear-t:#DCFFF1;--clear-i:#216E4E;
  --review:#B06B00;--review-t:#FBEFD6;--review-i:#7A4E00;
  --risk:#C6413B;--risk-t:#FBEAE9;--risk-i:#8E2A25;
  --unv:#3B7DD8;--unv-t:#E7F0FB;--unv-i:#243F73;
  --neutral:#626F86;--neutral-t:#F1F2F4;--neutral-i:#44526B;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif;
  --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  --sh:0 1px 1px rgba(9,30,66,.13);--sh2:0 4px 12px rgba(9,30,66,.16),0 0 1px rgba(9,30,66,.3);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--page);font-size:14px;line-height:1.43;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
code{font-family:var(--mono);font-size:.86em;background:#EEF0F2;border:1px solid #E3E6EA;border-radius:4px;padding:.5px 5px;color:#2C3E50;white-space:nowrap}
a{color:var(--link);text-decoration:none}a:hover{text-decoration:underline}
.hidden{display:none!important}
.app{display:flex;flex-direction:column;height:100vh}

/* top nav */
.nav{height:48px;flex:0 0 48px;display:flex;align-items:center;gap:6px;padding:0 12px 0 8px;background:var(--nav);color:#fff;position:relative;z-index:40}
.nav svg{stroke:currentColor;fill:none;stroke-width:1.9}
.nav .ic{width:32px;height:32px;border-radius:6px;display:grid;place-items:center;color:#fff;opacity:.94}
.nav .ic:hover{background:rgba(255,255,255,.16)}
.brand{display:flex;align-items:center;gap:10px;padding:0 6px 0 2px}
.brand .nice{font-weight:800;font-size:16px;letter-spacing:.02em}
.brand .prod{font-weight:400;font-size:14px;opacity:.92}
.nav .sp{flex:1}
.search{display:flex;align-items:center;gap:9px;width:min(620px,42vw);height:32px;background:#fff;border-radius:8px;padding:0 12px;color:var(--sub2);font-size:13.5px;cursor:text}
.search svg{width:16px;height:16px;stroke:var(--sub2)}
.create{display:flex;align-items:center;gap:7px;background:#fff;color:var(--nav-d);font-weight:600;font-size:14px;padding:6px 13px;border-radius:7px}
.create svg{width:15px;height:15px;stroke:var(--nav-d);stroke-width:2.4}
.rovo{display:flex;align-items:center;gap:7px;background:#fff;color:#1B2638;font-weight:600;font-size:13.5px;padding:6px 12px;border-radius:7px}
.rovo svg{width:16px;height:16px}
.navbell{position:relative}
.badge9{position:absolute;top:0;right:-2px;background:#E5493A;color:#fff;font-size:10px;font-weight:700;border-radius:9px;padding:0 5px;line-height:15px}
.reset{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#fff;border:1px solid rgba(255,255,255,.55);border-radius:7px;padding:5px 10px}
.reset:hover{background:rgba(255,255,255,.16)}
.reset svg{width:13px;height:13px;stroke:#fff;stroke-width:2}
.me{width:30px;height:30px;border-radius:50%;background:#D64545;color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700;margin-left:2px}

/* layout */
.body{flex:1;display:flex;min-height:0}
.side{width:248px;flex:0 0 248px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;overflow:auto}
.snav{padding:8px 8px 16px}
.si{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:7px 10px;border-radius:8px;color:var(--sub);font-size:14px;font-weight:500;position:relative}
.si:hover{background:var(--hover)}
.si.on{background:var(--sel);color:var(--nav-d);font-weight:600}
.si.on::before{content:"";position:absolute;left:-8px;top:6px;bottom:6px;width:3px;border-radius:3px;background:var(--nav)}
.si svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;flex:0 0 17px}
.si .vm{width:17px;height:17px;flex:0 0 17px}
.si .ext{margin-left:auto;width:13px;height:13px;opacity:.55}
.si .ch{margin-left:auto;width:14px;height:14px;opacity:.6}
.sgrp{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);padding:12px 10px 4px}
.sproj{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;font-size:14px;font-weight:600;color:var(--ink)}
.sproj:hover{background:var(--hover)}
.sproj .pi{width:20px;height:20px;border-radius:5px;background:#111;display:grid;place-items:center;color:#fff;font-size:8px;font-weight:800;flex:0 0 20px}
.sproj .pa{margin-left:auto;display:flex;gap:2px;color:var(--faint)}
.sdiv{height:1px;background:var(--border2);margin:8px 4px}

.main{flex:1;overflow:auto;min-width:0;background:#fff}
.wrap{max-width:1180px;padding:14px 28px 70px}

/* page head */
.phead{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.crumb{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--sub2);flex-wrap:wrap;min-width:0}
.crumb button{color:var(--sub2);font-size:12.5px;display:inline-flex;align-items:center;gap:5px}
.crumb button:hover{color:var(--link);text-decoration:underline}
.crumb .sep{color:var(--faint)}
.pacts{margin-left:auto;display:flex;align-items:center;gap:4px;color:var(--sub2)}
.pacts button{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:6px;font-size:12.5px;color:var(--sub2)}
.pacts button:hover{background:var(--hover)}
.pacts svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}

.cols{display:flex;gap:26px;align-items:flex-start}
.mcol{flex:1;min-width:0}
.scol{width:340px;flex:0 0 340px}

.ititle{font-size:24px;font-weight:600;letter-spacing:-.01em;margin:2px 0 12px;line-height:1.25}
.itbar{display:flex;gap:8px;margin-bottom:16px}
.sqbtn{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;display:grid;place-items:center;color:var(--sub)}
.sqbtn:hover{background:var(--hover)}
.sqbtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.9}

/* status pill + side controls */
.stwrap{position:relative}
.stbtn{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;padding:7px 10px 7px 13px;border-radius:6px}
.stbtn .ch{width:15px;height:15px;stroke-width:2.4}
.stbtn.todo{background:#DCDFE4;color:#42526E}
.stbtn.prog{background:var(--sel);color:var(--nav-d)}
.stbtn.done{background:var(--clear-t);color:var(--clear-i)}
.stbtn:hover{filter:brightness(.97)}
.bolt{width:34px;height:34px;border:1px solid var(--border);border-radius:6px;display:grid;place-items:center;color:var(--sub)}
.bolt:hover{background:var(--hover)}
.bolt svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.9}
.menu{position:absolute;top:calc(100% + 5px);left:0;background:#fff;border-radius:8px;box-shadow:var(--sh2);padding:6px;min-width:230px;z-index:30}
.menu .ml{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);padding:6px 10px 4px}
.menu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:8px 10px;border-radius:6px;font-size:13.5px}
.menu button:hover{background:var(--hover)}
.menu .sd{width:9px;height:9px;border-radius:2px}
.menu .sd.todo{background:#8993A4}.menu .sd.prog{background:var(--nav)}.menu .sd.done{background:var(--clear)}
.menu .cur{margin-left:auto;color:var(--faint);font-size:11px;font-weight:600}
.improve{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--border);border-radius:8px;padding:9px;font-size:14px;font-weight:600;color:var(--ink);margin-bottom:18px}
.improve:hover{background:var(--hover)}
.improve svg{width:16px;height:16px;fill:var(--indigo);stroke:none}

/* details panel */
.dcard{border:1px solid var(--border);border-radius:10px;padding:6px 16px 14px;margin-bottom:16px}
.dhead{display:flex;align-items:center;gap:8px;padding:10px 0 4px;font-size:14px;font-weight:600;color:var(--ink)}
.dhead svg{width:16px;height:16px;stroke:var(--sub2);fill:none;stroke-width:2}
.dfield{padding:9px 0}
.dlab{font-size:12px;font-weight:600;color:var(--sub2);margin-bottom:6px}
.dval{display:flex;align-items:center;gap:8px;font-size:13.5px;flex-wrap:wrap}
.dlink{color:var(--link);font-size:13.5px;font-weight:500;margin-top:5px;display:inline-block}
.chipf{background:var(--hover);border:1px solid var(--border2);color:var(--sub);border-radius:5px;font-size:12.5px;padding:3px 9px}
.muted{color:var(--faint)}
.prio{display:inline-flex;align-items:center;gap:6px;font-weight:600}
.prio svg{width:15px;height:15px}
.parent{display:inline-flex;align-items:center;gap:7px;color:var(--link);font-size:13px;font-weight:500}
.parent:hover{text-decoration:underline}

/* key details */
.kd{margin-bottom:8px}
.kdhead{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;margin-bottom:12px;cursor:pointer}
.kdhead svg{width:15px;height:15px;stroke:var(--sub2);fill:none;stroke-width:2.2}
.tabs{display:flex;gap:22px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:0 0 9px;font-size:14px;font-weight:500;color:var(--sub);position:relative;top:1px}
.tab.on{color:var(--nav-d);font-weight:600;border-bottom:2px solid var(--nav-d)}
.fh{font-size:15px;font-weight:600;margin:20px 0 8px}
.fh.first{margin-top:0}
.bodytext{font-size:14px;color:#283852;line-height:1.55}
.bodytext p{margin:0 0 8px}
.bul{margin:0;padding-left:20px}
.bul li{margin:6px 0;font-size:14px;color:#283852;line-height:1.5}
.acol{margin:0;padding-left:22px}
.acol li{margin:7px 0;font-size:14px;color:#283852;line-height:1.5}
.fieldrow{display:flex;gap:16px;align-items:center;margin:14px 0}
.fieldrow .fl{width:150px;flex:0 0 150px;color:var(--sub2);font-size:13px}
.fieldrow .fv .chipf{font-size:13px}

/* attachments */
.att{display:flex;gap:14px;flex-wrap:wrap;margin-top:4px}
.attc{width:190px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.attc .thumb{height:110px;background:#F4F7FB;border-bottom:1px solid var(--border2);display:grid;place-items:center;overflow:hidden}
.attc .meta{padding:8px 10px}
.attc .fn{font-size:12.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attc .dt{font-size:11.5px;color:var(--faint);margin-top:2px}
.cnt{background:#DFE1E6;color:var(--sub);border-radius:999px;font-size:11px;padding:1px 8px;font-weight:700;margin-left:8px}

/* child work items */
.ctbl{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:4px}
.ctopbar{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border2);color:var(--sub2);font-size:12.5px}
.ctopbar .done0{margin-left:auto;font-size:12px}
.cth,.ctr{display:grid;grid-template-columns:1fr 74px 46px 132px 128px;gap:8px;align-items:center;padding:10px 14px}
.cth{background:var(--surf);border-bottom:1px solid var(--border2);font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--sub2)}
.ctr{border-top:1px solid var(--border2);cursor:pointer}
.ctr:hover{background:var(--hover)}
.ctr .w{display:flex;align-items:center;gap:9px;min-width:0}
.ctr .wk{font-family:var(--mono);font-size:12px;color:var(--link);flex:0 0 auto}
.ctr .ws{font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptag{font-size:10px;font-weight:700;letter-spacing:.02em;padding:3px 8px;border-radius:5px;white-space:nowrap;display:inline-block}
.spts{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--sub);background:var(--hover);border-radius:4px;padding:2px 6px;justify-self:start}
.cst .astat{display:inline-flex;align-items:center;gap:6px}

/* activity */
.act{margin-top:26px}
.atabs{display:flex;gap:8px;align-items:center;margin:6px 0 14px}
.atab{font-size:13.5px;font-weight:600;color:var(--sub);padding:5px 12px;border-radius:6px}
.atab.on{background:var(--sel);color:var(--nav-d)}
.atab.more{display:inline-flex;align-items:center;gap:4px}
.atab.more svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.composer{display:flex;gap:11px;margin-bottom:8px}
.composer .box{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 12px}
.composer .ph{color:var(--faint);font-size:13.5px}
.qbtns{display:flex;gap:8px;margin-top:9px}
.qb{border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12.5px;font-weight:600;color:var(--sub)}
.qb:hover{background:var(--hover)}
.protip{font-size:12px;color:var(--faint);margin:4px 0 16px 44px}
.protip kbd{font-family:var(--mono);background:var(--hover);border:1px solid var(--border);border-radius:4px;padding:0 5px;font-size:11px}
.cmt{display:flex;gap:11px;padding:12px 0}
.cmt .nm{font-weight:600;font-size:13.5px}
.cmt .tm{color:var(--faint);font-size:12px;margin-left:8px}
.cmt .tx{font-size:13.5px;color:#283852;margin-top:4px;line-height:1.5}
.cmt .tx ol{margin:6px 0;padding-left:20px}
.cmt .tx li{margin:3px 0}
.ment{color:var(--link);font-weight:600}
.cmt .re{display:flex;gap:16px;margin-top:8px;color:var(--sub2)}
.cmt .re button{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--sub2)}
.cmt .re svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.addedac{display:inline-flex;align-items:center;gap:6px;background:#EFEDFB;border:1px solid #DAD5F3;color:var(--indigo);border-radius:6px;font-size:11.5px;font-weight:600;padding:3px 8px;margin-top:8px}

/* verdict panel */
.vp{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:22px;background:#fff;box-shadow:var(--sh)}
.vp-top{height:4px}
.vp-h{display:flex;align-items:center;gap:9px;padding:11px 16px;border-bottom:1px solid var(--border2);background:linear-gradient(#FCFBFF,#F7F5FD)}
.vp-h .mk{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;color:var(--indigo-d)}
.vp-h .mk svg{width:19px;height:19px}
.vp-h .ap{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--indigo);background:#EEEBFA;border-radius:5px;padding:2px 7px}
.vp-h .when{color:var(--faint);font-size:12px}
.vp-h .sp{flex:1}
.loz{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;border-radius:5px;padding:4px 9px}
.loz .dot{width:8px;height:8px;border-radius:50%}
.loz.clear{background:var(--clear-t);color:var(--clear-i)}.loz.clear .dot{background:var(--clear)}
.loz.review{background:var(--review-t);color:var(--review-i)}.loz.review .dot{background:var(--review)}
.loz.risk{background:var(--risk-t);color:var(--risk-i)}.loz.risk .dot{background:var(--risk)}
.loz.unverified,.loz.unv{background:var(--unv-t);color:var(--unv-i)}.loz.unverified .dot,.loz.unv .dot{background:var(--unv)}
.loz.neutral{background:var(--neutral-t);color:var(--neutral-i)}.loz.neutral .dot{background:var(--neutral)}
.loz.idle{background:#EDEEF0;color:var(--sub)}.loz.idle .dot{background:var(--faint)}
.ban{display:flex;gap:15px;align-items:flex-start;padding:18px 16px}
.bg{width:42px;height:42px;flex:0 0 42px;border-radius:50%;display:grid;place-items:center;margin-top:2px}
.bg svg{width:23px;height:23px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.bg.clear{background:var(--clear)}.bg.review{background:var(--review)}.bg.risk{background:var(--risk)}.bg.unverified,.bg.unv{background:var(--unv)}.bg.neutral{background:var(--neutral)}
.ban .lb{font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.lb.clear{color:var(--clear-i)}.lb.review{color:var(--review-i)}.lb.risk{color:var(--risk-i)}.lb.unverified,.lb.unv{color:var(--unv-i)}.lb.neutral{color:var(--neutral-i)}
.ban h2{font-size:18px;line-height:1.32;font-weight:600;margin:0;letter-spacing:-.01em}
.cov{display:flex;align-items:center;gap:13px;padding:13px 16px;border-top:1px solid var(--border2)}
.cov .cl{font-size:12px;font-weight:600;color:var(--sub);width:72px}
.cov .bar{flex:1;height:8px;border-radius:6px;background:var(--border2);overflow:hidden}
.cov .fill{height:100%;background:var(--mint);border-radius:6px}
.cov .num{font-family:var(--mono);font-size:13px;font-weight:700;white-space:nowrap}
.cov .hint{font-size:11.5px;color:var(--faint);white-space:nowrap}
.why{margin:0 16px 2px;background:var(--risk-t);border:1px solid #F3CFCC;border-radius:8px;padding:11px 13px;font-size:13px;color:var(--risk-i);display:flex;gap:9px}
.why svg{width:16px;height:16px;flex:0 0 16px;margin-top:2px;stroke:var(--risk);fill:none;stroke-width:2}
.sh{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);padding:13px 16px 4px}
.acl{border-top:1px solid var(--border2)}
.ar{display:flex;align-items:flex-start;gap:11px;padding:9px 16px;border-top:1px solid var(--border2)}
.ar:first-child{border-top:0}
.mk2{width:18px;height:18px;flex:0 0 18px;border-radius:50%;display:grid;place-items:center;margin-top:1px}
.mk2 svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
.mk2.yes{background:var(--clear)}.mk2.part{background:var(--review)}.mk2.no{background:var(--faint)}
.ar .tx{flex:1;font-size:13.5px}
.chip{font-family:var(--mono);font-size:11.5px;padding:2px 8px;border-radius:5px;background:var(--surf);color:var(--sub);border:1px solid var(--border2);white-space:nowrap;align-self:flex-start;margin-top:1px}
.chip.ev{background:#EAF7F1;color:#1c7a5a;border-color:#CDEBE0}
.chip.warn{background:#FEF6E7;color:#8a5a00;border-color:#F5E2B8}
.tagc{display:inline-block;margin-left:8px;font-size:10.5px;font-weight:700;color:var(--indigo);background:#EFEDFB;border:1px solid #D9D5F5;border-radius:5px;padding:1px 7px;vertical-align:1px}
.fl{padding:6px 16px 4px}
.fr{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--border2);font-size:13.5px}
.fr:first-of-type{border-top:0}
.fr .fi{width:18px;height:18px;flex:0 0 18px;margin-top:1px}
.fr .fi svg{width:18px;height:18px;fill:none;stroke-width:2}
.src{font-family:var(--mono);font-size:11.5px;color:var(--sub2)}
.audit{border-top:1px solid var(--border2)}
.audit summary{list-style:none;cursor:pointer;padding:12px 16px;font-size:12.5px;font-weight:600;color:var(--sub);display:flex;align-items:center;gap:8px}
.audit summary::-webkit-details-marker{display:none}
.audit summary .cv{transition:transform .15s;color:var(--faint)}
.audit[open] summary .cv{transform:rotate(90deg)}
.abody{padding:2px 16px 14px}
.aln{font-size:12.5px;color:var(--sub);padding:5px 0;border-top:1px dashed var(--border2);display:flex;gap:9px}
.aln:first-child{border-top:0}
.aln .k{font-family:var(--mono);color:var(--faint);flex:0 0 120px}
.vf{display:flex;gap:10px;padding:12px 16px;border-top:1px solid var(--border2);background:#FBFBFC}
.gbtn{border:1px solid var(--border);background:#fff;border-radius:6px;padding:7px 13px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.gbtn:hover{background:var(--hover)}.gbtn.pri{background:var(--nav);border-color:var(--nav);color:#fff}.gbtn.pri:hover{background:var(--nav-d)}
.gbtn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.idle{padding:18px 16px;color:var(--sub);font-size:13.5px}
.idle b{color:var(--ink)}.idle ul{margin:10px 0 0;padding-left:18px;color:var(--sub2);font-size:13px}.idle li{margin:3px 0}
.go{background:var(--nav);color:#fff;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:700;display:inline-flex;align-items:center;gap:9px}
.go:hover{background:var(--nav-d)}.go svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2}
.run{padding:8px 16px 16px}
.rl{display:flex;align-items:center;gap:11px;padding:7px 0;font-size:13.5px;color:var(--sub);opacity:0;transform:translateY(4px);transition:opacity .25s,transform .25s}
.rl.in{opacity:1;transform:none}
.rl .spn{width:16px;height:16px;flex:0 0 16px;border-radius:50%;border:2px solid #D6D3EF;border-top-color:var(--indigo);animation:vsp .7s linear infinite}
.rl.dn .spn{border:0;background:var(--clear);animation:none;position:relative}
.rl.dn .spn::after{content:"";position:absolute;inset:0;background:no-repeat center/11px url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><path d='M5 13l4 4L19 7'/></svg>")}
.rl.dn{color:var(--ink)}
@keyframes vsp{to{transform:rotate(360deg)}}

/* epic extras */
.goal{color:var(--sub);font-size:14px;margin:0 0 18px;max-width:680px}
.gap{background:#fff;border:1px solid #F0C9C6;border-left:4px solid var(--risk);border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;gap:12px}
.gap svg{width:22px;height:22px;stroke:var(--risk);fill:none;stroke-width:2;flex:0 0 22px}
.gap h3{margin:0 0 4px;font-size:14px;font-weight:700;color:var(--risk-i)}
.gap p{margin:0;font-size:13.5px;color:#5a3a37}
.sec{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin:22px 0 10px}
.eac{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.er{display:flex;align-items:center;gap:12px;padding:12px 14px;border-top:1px solid var(--border2)}
.er:first-child{border-top:0}
.er .en{font-family:var(--mono);font-size:12px;color:var(--faint);flex:0 0 34px}
.er .et{flex:1;font-size:13.5px}
.er .kids{display:flex;gap:5px;flex-wrap:wrap}
.kc{font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:5px;background:var(--surf);border:1px solid var(--border2);color:var(--sub2);cursor:pointer}
.kc:hover{border-color:var(--indigo);color:var(--indigo)}
.er.g{background:var(--risk-t)}
.gtag{font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--risk-i);background:#fff;border:1px solid #F0C9C6;border-radius:5px;padding:3px 8px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat{border:1px solid var(--border);border-radius:10px;padding:13px 15px}
.stat .sl{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--faint)}
.stat .sv{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:6px 0 2px}
.stat .sd{font-size:12px;color:var(--sub2)}
.den{background:var(--sel);border:1px solid #CFE0FA;border-radius:10px;padding:12px 15px;margin:14px 0 4px;font-size:13.5px;color:var(--nav-d);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.den .pips{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.pip{font-size:11.5px;padding:3px 9px;border-radius:999px;font-weight:700}
.pip.clear{background:var(--clear-t);color:var(--clear-i)}.pip.review{background:var(--review-t);color:var(--review-i)}.pip.risk{background:var(--risk-t);color:var(--risk-i)}.pip.unverified{background:var(--unv-t);color:var(--unv-i)}.pip.pending{background:#fff;color:var(--sub);border:1px solid var(--border)}

/* board */
.board{display:flex;gap:12px;overflow-x:auto;align-items:flex-start;padding-bottom:20px}
.bcol{flex:0 0 250px;background:var(--surf);border-radius:10px;padding:8px}
.bch{display:flex;align-items:center;gap:8px;padding:7px 8px 11px}
.bch .cn{font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--sub2)}
.bch .cc{background:#DFE1E6;color:var(--sub);border-radius:999px;font-size:11px;padding:1px 8px;font-weight:700}
.bch .vm{width:14px;height:14px;margin-left:auto}
.bch .vt{font-size:10px;font-weight:700;color:var(--indigo);letter-spacing:.02em}
.bcard{background:#fff;border:1px solid var(--border2);border-radius:8px;box-shadow:var(--sh);padding:11px 12px;margin-bottom:8px;cursor:pointer}
.bcard:hover{border-color:#C1C7D0}
.bcard.clear{border-left:3px solid var(--clear)}.bcard.review{border-left:3px solid var(--review)}.bcard.risk{border-left:3px solid var(--risk)}.bcard.unverified{border-left:3px solid var(--unv)}
.bcard .bs{font-size:13.5px;margin-bottom:11px;line-height:1.34}
.bcard .bf{display:flex;align-items:center;gap:8px}
.bcard .bk{font-family:var(--mono);font-size:12px;color:var(--sub2);display:flex;align-items:center;gap:6px}
.bcard .vm2{font-size:10px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.bcard .bp{margin-left:auto}
.emp{color:var(--faint);font-size:12.5px;text-align:center;padding:14px 8px}

.ito{border-radius:3px;display:grid;place-items:center;flex:0 0 auto}
.cav{border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700}
@media (max-width:1040px){.cols{flex-direction:column}.scol{width:100%;flex-basis:auto}.stats{grid-template-columns:1fr}}
@media (max-width:860px){.side{display:none}.cth,.ctr{grid-template-columns:1fr 60px 40px 96px}}
@media (prefers-reduced-motion:reduce){.rl{transition:none}.rl .spn{animation:none}}
.gbtn.ok{background:var(--clear-t);border-color:#BEEAD5;color:var(--clear-i);cursor:default}
.gbtn.ok svg{stroke:var(--clear-i)}
.gbtn.warn2{background:#FEF6E7;border-color:#F5E2B8;color:#8a5a00}
.gbtn.warn2 svg{stroke:#8a5a00}
.vfnote{display:flex;gap:9px;align-items:flex-start;padding:10px 16px;border-top:1px solid var(--border2);font-size:13px;color:var(--sub)}
.vfnote svg{width:16px;height:16px;flex:0 0 16px;margin-top:1px;stroke:var(--sub);fill:none;stroke-width:2}
.vfnote.ok{color:var(--clear-i)}.vfnote.ok svg{stroke:var(--clear-i)}
.dfrm{padding:14px 16px;border-top:1px solid var(--border2);background:#FBFBFC}
.dfl{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px}
.dfin{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:inherit;font-size:13.5px;color:var(--ink);resize:vertical;min-height:64px}
.dfin:focus{outline:2px solid var(--indigo);outline-offset:1px;border-color:var(--indigo)}

.chal{margin:0 16px 4px;border:1px solid #E3DEF7;background:#FAF9FE;border-radius:10px;padding:12px 14px}
.chal .cw{font-size:12.5px;font-weight:600;color:var(--indigo-d)}
.chal blockquote{margin:8px 0;padding:8px 12px;border-left:3px solid var(--indigo);background:#fff;border-radius:6px;font-size:13.5px;color:#3a3550;font-style:italic}
.chal .cr{font-size:13px;color:#283852;line-height:1.55}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(16px);background:#172B4D;color:#fff;font-size:13.5px;font-weight:500;padding:11px 18px;border-radius:10px;box-shadow:0 8px 24px rgba(9,30,66,.28);opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:80;max-width:min(560px,90vw)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
:focus-visible{outline:2px solid var(--indigo);outline-offset:2px;border-radius:4px}
</style>

<script>
/* ---------- icons + helpers ---------- */
var glyph={check:'<path d="M5 13l4 4L19 7"/>',bang:'<path d="M12 7v7"/><path d="M12 17.5v.01"/>',cross:'<path d="M6 6l12 12M18 6L6 18"/>',quest:'<path d="M9.2 9a3 3 0 1 1 4.3 2.7c-.9.5-1.5 1-1.5 2.1"/><path d="M12 17.5v.01"/>',minus:'<path d="M6 12h12"/>'};
var warnTri='<path d="M12 9v4"/><path d="M12 17v.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>';
var arrowR='<path d="M5 12h14"/><path d="M13 6l6 6-6 6"/>';
var rerun='<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>';
var LIGHT='<path d="M10 2 L4.5 10.6 H8 l-1 5.4 6.5-9.4 H10 l1-4.6 z" fill="#fff"/>';
var BOOK='<path d="M5 3.2h8a1 1 0 0 1 1 1V15.4a.4.4 0 0 1-.63.33L9 12.9l-4.37 2.83A.4.4 0 0 1 4 15.4V4.2a1 1 0 0 1 1-1z" fill="#fff"/>';
var CHK='<path d="M4 9.5l3 3L14 5.5" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>';
var typeIcon={epic:{bg:'#6E56CF',g:LIGHT},story:{bg:'#4FA82E',g:BOOK},task:{bg:'#4688EC',g:CHK},spike:{bg:'#1C9DBB',g:LIGHT},capability:{bg:'#DE6B2F',g:LIGHT}};
var vmark='<svg class="vm" viewBox="0 0 100 100"><rect x="6" y="6" width="88" height="88" rx="22" fill="#5A46C6"/><path d="M30 52 L44 66 L72 34" fill="none" stroke="#5DCAA5" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var avc={PJ:'#D9820B',MF:'#1F2D3D',MB:'#1868DB',SK:'#D64545',SM:'#0C8074',AS:'#8A3FD1'};
var nameMap={PJ:'Prashasti Jain',MF:'Matt Field',MB:'Megha Biradar',SK:'You',SM:'Sanyog Mishra',AS:'Asma Syeda'};
var labels={clear:'Clear',review:'Review',risk:'Risk',unverified:'Unverified',neutral:'Done',idle:'Not run'};
function ito(t,s){s=s||16;var x=typeIcon[t]||typeIcon.task;return '<span class="ito" style="background:'+x.bg+';width:'+s+'px;height:'+s+'px"><svg width="'+(s-4)+'" height="'+(s-4)+'" viewBox="0 0 18 18">'+x.g+'</svg></span>';}
function av(i,s){s=s||22;return '<span class="cav" style="background:'+(avc[i]||'#5E6C84')+';width:'+s+'px;height:'+s+'px;font-size:'+Math.round(s*0.42)+'px">'+i+'</span>';}
function loz(s,label){return '<span class="loz '+s+'"><span class="dot"></span>'+(label||labels[s])+'</span>';}
function badgeSvg(s){var m={clear:'check',review:'bang',risk:'cross',unverified:'quest',neutral:'minus'}[s]||'minus';return '<svg viewBox="0 0 24 24">'+glyph[m]+'</svg>';}
function prioHTML(p){var c=p==='P1'?'#C6413B':'#D9820B';var d=p==='P1'?'<path d="M12 19V6M6 12l6-6 6 6"/>':'<path d="M6 14l6-6 6 6M6 9l6-6 6 6"/>';return '<span class="prio"><svg viewBox="0 0 24 24" fill="none" stroke="'+c+'" stroke-width="2">'+d+'</svg>'+p+'</span>';}
var STATUSES=[['Backlog','backlog'],['Ready for Dev','ready'],['In Progress','progress'],['In Review','inreview'],['Validate','validate'],['Done','done']];
function statusCat(c){return c==='done'?'done':(c==='backlog'||c==='ready'?'todo':'prog');}

function uiOf(k){var it=ISSUES[k];it.ui=it.ui||{};return it.ui;}
function accept(k){var it=ISSUES[k],ui=uiOf(k);ui.accepted=true;ui.disputing=false;
  it.comments=(it.comments||[]).concat([{who:'SK',tm:'just now',mentions:[it.assignee],html:(it.state==='clear'?'Approved this verdict — looks good.':'Accepted this verdict. @'+nameMap[it.assignee]+' please fix the flagged issue before re-validating.')}]);
  showToast(it.state==='clear'?('Approved · '+nameMap[it.assignee]+' notified'):(nameMap[it.assignee]+' notified to fix the flagged issue'));render();}
function openDispute(k){uiOf(k).disputing=true;render();}
function cancelDispute(k){uiOf(k).disputing=false;render();}
function submitDispute(k){var el=document.getElementById('disputeInput');var val=el?el.value.trim():'';if(!val){if(el){el.focus();el.style.borderColor='var(--risk)';}return;}var it=ISSUES[k],ui=uiOf(k);ui.disputing=false;ui.disputeText=val;ui.rerunning=true;ui.reran=false;it.verdictState='running';render();runDispute(k);}
function runDispute(k){animateLog(function(){var it=ISSUES[k],ui=uiOf(k);it.verdictState='done';ui.rerunning=false;ui.reran=true;showToast('Re-evaluated with your input');render();});}
function createPR(k){var it=ISSUES[k],ui=uiOf(k);ui.prNum=(it.report&&it.report.fixNum)||4899;ui.prDesc=(it.report&&it.report.fix)||'address the flagged discrepancy';
  it.comments=(it.comments||[]).concat([{who:'SK',tm:'just now',html:'Opened <b>PR '+ui.prNum+'</b> to '+ui.prDesc+'.'}]);
  showToast('Opened fix PR '+ui.prNum);render();}
function render(){
  var el=document.getElementById('view');
  el.innerHTML=view==='board'?boardView():(view==='epic'?epicView():issueView(selected));
  el.parentElement.scrollTop=0;
  document.getElementById('nav-board').classList.toggle('on',view==='board');
  document.getElementById('nav-epic').classList.toggle('on',view==='epic');
  [].slice.call(el.querySelectorAll('[data-open]')).forEach(function(x){x.onclick=function(e){e.stopPropagation();selected=x.getAttribute('data-open');view='issue';menuOpen=false;render();};});
  [].slice.call(el.querySelectorAll('[data-epic]')).forEach(function(x){x.onclick=function(e){e.stopPropagation();view='epic';menuOpen=false;render();};});
  [].slice.call(el.querySelectorAll('[data-board]')).forEach(function(x){x.onclick=function(e){e.stopPropagation();view='board';menuOpen=false;render();};});
  [].slice.call(el.querySelectorAll('[data-epicrun]')).forEach(function(x){x.onclick=function(e){e.stopPropagation();runEpic();};});
  [].slice.call(el.querySelectorAll('[data-accept]')).forEach(function(x){x.onclick=function(e){e.stopPropagation();accept(selected);};});
  [].slice.call(el.querySelectorAll('[data-dispute]')).forEach(function(x){x.onclick=function(e){e.stopPropagation();openDispute(selected);};});
  [].slice.call(el.querySelectorAll('[data-dispute-cancel]')).forEach(function(x){x.onclick=function(e){e.stopPropagation();cancelDispute(selected);};});
  [].slice.call(el.querySelectorAll('[data-dispute-submit]')).forEach(function(x){x.onclick=function(e){e.stopPropagation();submitDispute(selected);};});
  [].slice.call(el.querySelectorAll('[data-createpr]')).forEach(function(x){x.onclick=function(e){e.stopPropagation();createPR(selected);};});
  [].slice.call(el.querySelectorAll('[data-openpr]')).forEach(function(x){x.onclick=function(e){e.stopPropagation();showToast('Opening PR '+((ISSUES[selected].dev||{}).pr||''));};});
  var sb=document.getElementById('statusbtn');
  if(sb){
    sb.onclick=function(e){e.stopPropagation();menuOpen=!menuOpen;render();};
    [].slice.call(el.querySelectorAll('#statusmenu [data-status]')).forEach(function(b){b.onclick=function(e){e.stopPropagation();var target=b.getAttribute('data-status');menuOpen=false;
      if(view==='epic'){epicStatus=target;if(target==='Validate'){runEpic();}else{render();}return;}
      var it=ISSUES[selected];it.status=target;it.column=colOf(target);
      if(selected==='INT-57550'&&target==='Validate'&&it.verdictState!=='done'){it.verdictState='running';render();runValidate();}else{render();}
    };});
    if(menuOpen){var m=document.getElementById('statusmenu');if(m)m.classList.remove('hidden');}
  }
}
document.addEventListener('click',function(){if(menuOpen){menuOpen=false;render();}});
document.getElementById('nav-board').onclick=function(){view='board';menuOpen=false;render();};
document.getElementById('nav-epic').onclick=function(){view='epic';menuOpen=false;render();};
document.getElementById('btn-reset').onclick=reset;
render();
</script>
</body>
</html>
